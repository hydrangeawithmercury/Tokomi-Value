<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tokomi Value</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  Tokomi Value — native shell (Tauri v2)
  100% local: no network requests, no fonts fetched, no analytics, no tracking.
  Screen analysis happens entirely on this machine; nothing is transmitted.

  Capture model: manual-grab first. A single "📷 grab" reads ONE high-resolution
  frame and analyses it (crisp, cheap). An optional live toggle streams at a
  lighter analysis resolution for when you want to watch while you move.
-->
<style>
  :root{
    --bg:#121316; --bg-panel:#191b20; --bg-well:#0c0d10;
    --line:#2a2d34; --line-soft:#212329;
    --ink:#e8e6df; --ink-dim:#8a8d97; --ink-faint:#52555f;
    --accent:oklch(78% 0.16 95); --accent-dim:oklch(78% 0.16 95 / 0.16);
    --lowkey:oklch(62% 0.13 255); --highkey:oklch(85% 0.09 95); --danger:oklch(62% 0.19 25);
    --live:oklch(72% 0.17 145);
    --font-ui:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    --font-mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;user-select:none;}
  body{display:flex;flex-direction:column;position:relative;}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

  /* ---- opening splash ---- */
  .splash{position:fixed;inset:0;z-index:50;background:var(--bg);
    display:flex;align-items:center;justify-content:center;padding:8%;}
  .splash img{max-width:82%;max-height:60%;object-fit:contain;
    filter:drop-shadow(0 0 26px rgba(120,170,255,.18));
    animation:splashLogo 2.3s cubic-bezier(.2,.7,.2,1) forwards;}
  .splash.done{animation:splashOut .5s ease forwards;}
  @keyframes splashLogo{
    0%{opacity:0;transform:scale(.94) translateY(6px);}
    42%{opacity:1;transform:scale(1) translateY(0);}
    80%{opacity:1;transform:scale(1) translateY(0);}
    100%{opacity:.96;transform:scale(1.005);}
  }
  @keyframes splashOut{to{opacity:0;visibility:hidden;}}
  @media (prefers-reduced-motion:reduce){ .splash{display:none;} }

  /* ---- draggable titlebar ---- */
  .titlebar{display:flex;align-items:center;justify-content:space-between;
    padding:9px 12px;background:var(--bg-well);border-bottom:1px solid var(--line);
    -webkit-app-region:drag;app-region:drag;flex:0 0 auto;}
  .titlebar-left{display:flex;align-items:center;gap:9px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);transition:.25s;}
  .dot.live{background:var(--live);box-shadow:0 0 0 3px oklch(72% 0.17 145 / 0.16);}
  .dot.armed{background:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
  .titlebar-title{font-size:12px;letter-spacing:.16em;font-weight:700;text-transform:uppercase;}
  .titlebar-sub{font-size:9.5px;color:var(--ink-faint);letter-spacing:.04em;}
  .titlebar-right{display:flex;align-items:center;gap:8px;-webkit-app-region:no-drag;app-region:no-drag;}
  .status-text{font-size:10px;color:var(--ink-dim);}
  .status-text.live{color:var(--live);} .status-text.armed{color:var(--accent);}
  .tb-btn{cursor:pointer;border:1px solid var(--line);background:var(--bg-well);color:var(--ink-faint);
    border-radius:6px;width:30px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .tb-btn:hover{color:var(--ink);border-color:#3a3d46;}
  .tb-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim);}
  .tb-btn.danger:hover{color:var(--danger);border-color:var(--danger);}
  .tb-btn.hidden{display:none;}

  .body{flex:1 1 auto;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:11px;}

  .controlbar{display:flex;gap:6px;}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--bg-well);
    color:var(--ink-dim);border-radius:6px;padding:9px 12px;font-size:12px;transition:all .15s;}
  button:hover{color:var(--ink);border-color:#3a3d46;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  button.primary{flex:1;background:var(--accent);color:#191203;border-color:var(--accent);font-weight:700;font-size:12.5px;}
  button.primary:hover{filter:brightness(1.08);}
  button.live-toggle{width:44px;display:flex;align-items:center;justify-content:center;font-size:12px;}
  button.live-toggle.active{background:oklch(72% 0.17 145 / 0.16);color:var(--live);border-color:var(--live);}
  button.tab{flex:1;padding:7px 6px;font-size:11px;}
  button.tab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
  .tabs{display:flex;gap:5px;}
  select{font-family:inherit;background:var(--bg-well);color:var(--ink-dim);border:1px solid var(--line);
    border-radius:6px;padding:8px 9px;font-size:11px;}
  select:disabled{opacity:.4;}

  .preview-wrap{position:relative;width:100%;aspect-ratio:1/1;
    background:linear-gradient(45deg,#1d1f25 25%,transparent 25%),linear-gradient(-45deg,#1d1f25 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1d1f25 75%),linear-gradient(-45deg,transparent 75%,#1d1f25 75%);
    background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;background-color:var(--bg-well);
    border:1px solid var(--line-soft);border-radius:6px;overflow:hidden;}
  canvas#preview{width:100%;height:100%;display:block;}
  .preview-wrap.flash::after{content:"";position:absolute;inset:0;background:#fff;
    animation:shutter .28s ease-out;pointer-events:none;}
  @keyframes shutter{from{opacity:.55;}to{opacity:0;}}
  .preview-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;color:var(--ink-faint);font-size:11.5px;text-align:center;padding:20px;line-height:1.7;}
  .preview-empty .big{font-size:30px;opacity:.5;}
  .preview-label{position:absolute;top:8px;left:8px;font-size:9.5px;letter-spacing:.1em;color:var(--ink-dim);
    background:rgba(12,13,16,.72);padding:3px 7px;border-radius:4px;text-transform:uppercase;pointer-events:none;}

  .readouts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .stat{background:var(--bg-well);border:1px solid var(--line-soft);border-radius:6px;padding:7px 8px;}
  .stat-label{font-size:8.5px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}
  .stat-value{font-size:15px;font-weight:700;margin-top:2px;}

  .panel{background:var(--bg-well);border:1px solid var(--line-soft);border-radius:6px;padding:10px 10px 8px;}
  .panel-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
  .panel-title{font-size:10px;letter-spacing:.09em;color:var(--ink-dim);text-transform:uppercase;}
  .panel-key{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
  .key-low{background:oklch(62% 0.13 255 / 0.18);color:var(--lowkey);}
  .key-mid{background:var(--accent-dim);color:var(--accent);}
  .key-high{background:oklch(85% 0.09 95 / 0.18);color:var(--highkey);}
  canvas#hist{width:100%;height:70px;display:block;}
  .hist-scale{display:flex;justify-content:space-between;font-size:8.5px;color:var(--ink-faint);margin-top:3px;}

  .hint{font-size:10px;line-height:1.6;color:var(--ink-faint);}
  .hint b{color:var(--ink-dim);}
  kbd{font-family:var(--font-mono);font-size:9.5px;background:var(--bg-well);border:1px solid var(--line);
    border-radius:4px;padding:1px 5px;color:var(--ink-dim);}

  .footer-logo{display:flex;justify-content:center;align-items:center;padding:4px 0 2px;margin-top:auto;}
  .footer-logo img{height:26px;width:auto;opacity:.34;transition:opacity .2s;
    filter:saturate(.9);}
  .footer-logo img:hover{opacity:.7;}
</style>
</head>
<body>

  <div class="splash" id="splash">
    <img src="logo.png" alt="Tokomi Value">
  </div>

  <div class="titlebar">
    <div class="titlebar-left">
      <div class="dot" id="liveDot"></div>
      <div>
        <div class="titlebar-title">Tokomi Value</div>
        <div class="titlebar-sub">OKLCh Value Analyzer</div>
      </div>
    </div>
    <div class="titlebar-right">
      <span class="status-text" id="statusText">未接続</span>
      <button class="tb-btn danger hidden" id="disconnectBtn" title="共有を解除">&#x23FB;</button>
      <button class="tb-btn active" id="pinBtn" title="常に最前面（クリックで切替）">&#x25C9;</button>
    </div>
  </div>

  <div class="body">
    <div class="controlbar">
      <button class="primary" id="primaryBtn">ウィンドウを選択して開始</button>
      <button class="live-toggle" id="liveBtn" title="ライブ更新（動かしながら見る）" disabled>&#x25B6;</button>
      <select id="rateSelect" title="ライブ更新の間隔" disabled>
        <option value="500">2fps</option>
        <option value="333" selected>3fps</option>
        <option value="250">4fps</option>
        <option value="167">6fps</option>
      </select>
    </div>

    <div class="tabs">
      <button class="tab active" data-mode="normal">通常</button>
      <button class="tab" data-mode="value">明度 L</button>
      <button class="tab" data-mode="hue">色相 H</button>
      <button class="tab" data-mode="chroma">彩度 C</button>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <canvas id="preview" width="500" height="500"></canvas>
      <div class="preview-label" id="previewLabel" style="display:none;"></div>
      <div class="preview-empty" id="emptyState">
        <div class="big">&#x25E7;</div>
        <div>「開始」を押してクリスタのウィンドウを共有。<br>以降は <b>&#x1F4F7; 今の画面を取得</b> で最新を読み込みます。</div>
      </div>
    </div>

    <div class="readouts">
      <div class="stat"><div class="stat-label">平均 L</div><div class="stat-value mono" id="statL">&mdash;</div></div>
      <div class="stat"><div class="stat-label">コントラスト &sigma;</div><div class="stat-value mono" id="statSigma">&mdash;</div></div>
      <div class="stat"><div class="stat-label">平均 C</div><div class="stat-value mono" id="statC">&mdash;</div></div>
      <div class="stat"><div class="stat-label">主要 H</div><div class="stat-value mono" id="statH">&mdash;</div></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">明度ヒストグラム</span>
        <span class="panel-key key-mid" id="keyChip">&mdash;</span>
      </div>
      <canvas id="hist" width="460" height="70"></canvas>
      <div class="hist-scale"><span>0 黒</span><span>ローキー</span><span>中間</span><span>ハイキー</span><span>1 白</span></div>
    </div>

    <div class="hint">
      <b>&#x1F4F7;</b> で現在のキャンバスを1枚取得（くっきり）。<b>&#x25B6;</b> でライブ更新。
      <b>呼び出し/しまう:</b> <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd>。<b>&#x25C9;</b> 最前面固定。外部通信なし。
    </div>

    <div class="footer-logo"><img src="logo-small.png" alt="Tokomi Value"></div>
  </div>

<script>
(() => {
  "use strict";

  const TAURI = (typeof window !== 'undefined') && window.__TAURI__;
  const invoke = TAURI ? window.__TAURI__.core.invoke : null;

  // Two analysis resolutions: crisp one-shot grab vs. lighter continuous stream.
  const RES_GRAB = 240;
  const RES_STREAM = 88;

  const el = {
    splash:document.getElementById('splash'),
    primaryBtn:document.getElementById('primaryBtn'),
    liveBtn:document.getElementById('liveBtn'),
    rateSelect:document.getElementById('rateSelect'),
    disconnectBtn:document.getElementById('disconnectBtn'),
    pinBtn:document.getElementById('pinBtn'),
    liveDot:document.getElementById('liveDot'),
    statusText:document.getElementById('statusText'),
    emptyState:document.getElementById('emptyState'),
    previewWrap:document.getElementById('previewWrap'),
    previewLabel:document.getElementById('previewLabel'),
    preview:document.getElementById('preview'),
    hist:document.getElementById('hist'),
    statL:document.getElementById('statL'), statSigma:document.getElementById('statSigma'),
    statC:document.getElementById('statC'), statH:document.getElementById('statH'),
    keyChip:document.getElementById('keyChip'),
  };
  const pctx = el.preview.getContext('2d',{willReadFrequently:true});
  const hctx = el.hist.getContext('2d');

  // reusable offscreen sample canvas, sized per analysis pass
  const sample = document.createElement('canvas');
  const sctx = sample.getContext('2d',{willReadFrequently:true});

  const state = { stream:null, video:null, liveTimer:null, mode:'normal',
                  connected:false, live:false, pinned:true };

  // --- perf: sRGB(0..255) -> linear lookup, so the hot loop avoids pow() ---
  const LIN = new Float32Array(256);
  for(let i=0;i<256;i++){ const c=i/255; LIN[i]=c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4); }
  const linToSrgb = c => { const v=c<=0.0031308?12.92*c:1.055*Math.pow(c,1/2.4)-0.055; return v<0?0:v>1?255:(v*255+.5)|0; };
  const cbrt = Math.cbrt;

  function rgbToOklch(r,g,b){
    const lr=LIN[r],lg=LIN[g],lb=LIN[b];
    const l=0.4122214708*lr+0.5363325363*lg+0.0514459929*lb;
    const m=0.2119034982*lr+0.6806995451*lg+0.1073969566*lb;
    const s=0.0883024619*lr+0.2817188376*lg+0.6299787005*lb;
    const l_=cbrt(l),m_=cbrt(m),s_=cbrt(s);
    const L=0.2104542553*l_+0.7936177850*m_-0.0040720468*s_;
    const A=1.9779984951*l_-2.4285922050*m_+0.4505937099*s_;
    const B=0.0259040371*l_+0.7827717662*m_-0.8086757660*s_;
    const C=Math.sqrt(A*A+B*B);
    let H=Math.atan2(B,A)*180/Math.PI; if(H<0) H+=360;
    return [L,C,H];
  }
  function oklchToRgb(L,C,H){
    const a=C*Math.cos(H*Math.PI/180), b=C*Math.sin(H*Math.PI/180);
    const l=(L+0.3963377774*a+0.2158037573*b)**3;
    const m=(L-0.1055613458*a-0.0638541728*b)**3;
    const s=(L-0.0894841775*a-1.2914855480*b)**3;
    return [ linToSrgb( 4.0767416621*l-3.3077115913*m+0.2309699292*s),
             linToSrgb(-1.2684380046*l+2.6097574011*m-0.3413193965*s),
             linToSrgb(-0.0041960863*l-0.7034186147*m+1.7076147010*s) ];
  }

  // ------------------------------------------------------------------ capture
  async function connect(){
    let stream;
    try{ stream = await navigator.mediaDevices.getDisplayMedia({video:{frameRate:10},audio:false}); }
    catch(e){ return; } // picker dismissed
    state.stream=stream;
    state.video=document.createElement('video');
    state.video.srcObject=stream; await state.video.play();
    state.connected=true;
    stream.getVideoTracks()[0].addEventListener('ended', disconnect);

    el.emptyState.style.display='none';
    el.primaryBtn.textContent='\uD83D\uDCF7 今の画面を取得';
    el.liveBtn.disabled=false;
    el.disconnectBtn.classList.remove('hidden');
    setStatus('armed','取得待機');
    grabOnce(); // show the first frame immediately
  }

  function disconnect(){
    setLive(false);
    if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
    state.stream=null; state.video=null; state.connected=false;

    el.primaryBtn.textContent='ウィンドウを選択して開始';
    el.liveBtn.disabled=true; el.disconnectBtn.classList.add('hidden');
    el.emptyState.style.display='flex';
    setStatus('','未接続');
    pctx.clearRect(0,0,el.preview.width,el.preview.height);
    hctx.clearRect(0,0,el.hist.width,el.hist.height);
    ['statL','statSigma','statC','statH'].forEach(k=>el[k].textContent='\u2014');
    el.keyChip.textContent='\u2014'; el.keyChip.className='panel-key key-mid';
  }

  function grabOnce(){
    if(!state.connected) return;
    analyze(RES_GRAB);
    el.previewWrap.classList.remove('flash');
    void el.previewWrap.offsetWidth;      // restart the shutter animation
    el.previewWrap.classList.add('flash');
  }

  function setLive(on){
    state.live=on;
    el.liveBtn.classList.toggle('active',on);
    el.liveBtn.innerHTML = on ? '&#x23F8;' : '&#x25B6;';
    el.rateSelect.disabled = !on;
    if(state.liveTimer){ clearTimeout(state.liveTimer); state.liveTimer=null; }
    if(on && state.connected){
      setStatus('live','ライブ更新');
      const tick=()=>{ if(!state.live||!state.video) return; analyze(RES_STREAM);
        state.liveTimer=setTimeout(tick,parseInt(el.rateSelect.value,10)); };
      tick();
    }else if(state.connected){
      setStatus('armed','取得待機');
    }
  }

  function setStatus(kind,text){
    el.statusText.textContent=text;
    el.statusText.className='status-text'+(kind?' '+kind:'');
    el.liveDot.className='dot'+(kind?' '+kind:'');
  }

  // ------------------------------------------------------------------ analysis
  function analyze(res){
    const v=state.video; if(!v||!v.videoWidth) return;
    const side=Math.min(v.videoWidth,v.videoHeight);
    const sx=(v.videoWidth-side)/2, sy=(v.videoHeight-side)/2;

    if(sample.width!==res){ sample.width=res; sample.height=res; }
    sctx.drawImage(v,sx,sy,side,side,0,0,res,res);
    const src=sctx.getImageData(0,0,res,res).data;
    const N=res*res;
    const Ls=new Float32Array(N);
    const hueBins=new Float32Array(36);
    let sumL=0,sumC=0;
    const mode=state.mode;
    const buildMap = (mode!=='normal');
    const out = buildMap ? sctx.createImageData(res,res) : null;

    for(let i=0,p=0;i<N;i++,p+=4){
      const r=src[p],g=src[p+1],b=src[p+2];
      const [L,C,H]=rgbToOklch(r,g,b);
      Ls[i]=L; sumL+=L; sumC+=C;
      if(C>0.02) hueBins[(H/10|0)%36]+=C;
      if(buildMap){
        let R,G,B;
        if(mode==='value'){ const gr=(L<0?0:L>1?255:(L*255+.5)|0); R=G=B=gr; }
        else if(mode==='chroma'){ const t=C/0.35, gr=(t>1?255:(t*255+.5)|0); R=G=B=gr; }
        else { if(C>0.02){[R,G,B]=oklchToRgb(0.70,0.13,H);} else {const gr=(L*160+40)|0;R=G=B=gr;} }
        out.data[p]=R;out.data[p+1]=G;out.data[p+2]=B;out.data[p+3]=255;
      }
    }

    // paint preview
    pctx.imageSmoothingEnabled=true;
    pctx.clearRect(0,0,el.preview.width,el.preview.height);
    if(buildMap){
      sctx.putImageData(out,0,0);
      pctx.drawImage(sample,0,0,el.preview.width,el.preview.height);
    }else{
      // normal mode: draw the source frame directly for maximum crispness
      pctx.drawImage(v,sx,sy,side,side,0,0,el.preview.width,el.preview.height);
    }

    // stats
    const meanL=sumL/N, meanC=sumC/N;
    let varSum=0; for(let i=0;i<N;i++){const d=Ls[i]-meanL;varSum+=d*d;}
    const sigma=Math.sqrt(varSum/N);
    let dB=0,dV=0; for(let i=0;i<36;i++) if(hueBins[i]>dV){dV=hueBins[i];dB=i;}
    const domHue=dV>0.001?Math.round(dB*10+5):null;

    el.statL.textContent=meanL.toFixed(3);
    el.statSigma.textContent=sigma.toFixed(3);
    el.statC.textContent=meanC.toFixed(3);
    el.statH.textContent=domHue===null?'\u2014':domHue+'\u00B0';
    drawHistogram(Ls,meanL);

    let label,cls;
    if(meanL<0.38){label='ローキー寄り';cls='key-low';}
    else if(meanL>0.68){label='ハイキー寄り';cls='key-high';}
    else{label='中間トーン';cls='key-mid';}
    el.keyChip.textContent=label; el.keyChip.className='panel-key '+cls;
  }

  function drawHistogram(Ls,meanL){
    const bins=48,counts=new Float32Array(bins);
    for(let i=0;i<Ls.length;i++) counts[Math.min(bins-1,(Ls[i]*bins)|0)]++;
    let maxC=1; for(let i=0;i<bins;i++) if(counts[i]>maxC) maxC=counts[i];
    const w=el.hist.width,h=el.hist.height;
    hctx.clearRect(0,0,w,h);
    hctx.fillStyle='rgba(255,255,255,0.02)';
    hctx.fillRect(0,0,w*0.38,h); hctx.fillRect(w*0.68,0,w*0.32,h);
    const bw=w/bins;
    for(let i=0;i<bins;i++){
      const bh=(counts[i]/maxC)*(h-4);
      hctx.fillStyle=`oklch(${((i/bins)*100).toFixed(0)}% 0.02 95)`;
      hctx.fillRect(i*bw+0.5,h-bh,bw-1,bh);
    }
    const mx=meanL*w;
    hctx.strokeStyle='oklch(78% 0.16 95)'; hctx.lineWidth=1.5;
    hctx.beginPath(); hctx.moveTo(mx,0); hctx.lineTo(mx,h); hctx.stroke();
  }

  // ------------------------------------------------------------------ pin (native)
  async function setPinned(on){
    state.pinned=on;
    el.pinBtn.classList.toggle('active',on);
    el.pinBtn.title = on ? '常に最前面：ON（クリックでOFF）' : '常に最前面：OFF（クリックでON）';
    if(invoke){ try{ await invoke('set_always_on_top',{on}); }catch(e){} }
  }

  // ------------------------------------------------------------------ wiring
  el.primaryBtn.addEventListener('click',()=> state.connected ? grabOnce() : connect());
  el.liveBtn.addEventListener('click',()=>{ if(state.connected) setLive(!state.live); });
  el.disconnectBtn.addEventListener('click', disconnect);
  el.pinBtn.addEventListener('click',()=>setPinned(!state.pinned));

  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); state.mode=btn.dataset.mode;
      const labels={normal:'',value:'VALUE  L*',hue:'HUE  H (uniform L)',chroma:'CHROMA  C'};
      const t=labels[state.mode];
      el.previewLabel.style.display=t?'block':'none'; el.previewLabel.textContent=t;
      // reflect the new mode right away on the current frame
      if(state.connected && !state.live) grabOnce();
    });
  });

  // opening splash: fade in, hold, fade out, then remove
  function dismissSplash(){
    if(!el.splash || el.splash.dataset.done) return;
    el.splash.dataset.done='1';
    el.splash.classList.add('done');
    el.splash.addEventListener('animationend',()=>el.splash.remove(),{once:true});
    setTimeout(()=>el.splash&&el.splash.remove(),800);
  }
  setTimeout(dismissSplash, 2100);

  setPinned(true);
})();
</script>
</body>
</html>
